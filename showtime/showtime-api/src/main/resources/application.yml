spring:
  application:
    name: showtime
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:1115}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  auth:
    login-success-redirect-url: ${LOGIN_SUCCESS_REDIRECT_URL:http://localhost:5173}
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
      - http://localhost:3000
  invite:
    base-url: ${INVITE_BASE_URL:http://localhost:5173/join}
    expires-hours: ${INVITE_EXPIRES_HOURS:168}
  video:
    storage-dir: ${VIDEO_STORAGE_DIR:./storage/videos}
